<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Bot</title>
    <link rel="stylesheet" href="/miniapp/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <div id="loading" class="loading">Загрузка...</div>
        <div id="main" class="hidden">
            <div class="header">
                <h1>Task Bot</h1>
                <div class="balance">💰 <span id="balance">0</span></div>
            </div>
            <div class="tabs">
                <button class="tab active" data-tab="tasks">Задачи</button>
                <button class="tab" data-tab="new-task">Новая</button>
                <button class="tab" data-tab="auto">Авто</button>
                <button class="tab" data-tab="profile">Профиль</button>
            </div>
            <div id="tab-tasks" class="tab-content active">
                <div id="tasks-list"></div>
            </div>
            <div id="tab-new-task" class="tab-content">
                <form id="task-form">
                    <select id="task-type" required>
                        <option value="">Тип задачи</option>
                        <option value="channel">Канал</option>
                        <option value="post">Пост</option>
                        <option value="reaction">Реакция</option>
                        <option value="view">Просмотр</option>
                        <option value="subscriber">Подписчик</option>
                    </select>
                    <input type="url" id="task-link" placeholder="Ссылка" required>
                    <input type="number" id="task-qty" placeholder="Количество" min="1" required>
                    <input type="number" id="task-deadline" placeholder="Время (мин)" min="1" required>
                    <button type="submit" class="btn-primary">Создать задачу</button>
                </form>
            </div>
            <div id="tab-auto" class="tab-content">
                <form id="auto-task-form">
                    <select id="auto-task-type" required>
                        <option value="">Тип задачи</option>
                        <option value="channel">Канал</option>
                        <option value="post">Пост</option>
                        <option value="reaction">Реакция</option>
                        <option value="view">Просмотр</option>
                        <option value="subscriber">Подписчик</option>
                    </select>
                    <input type="url" id="auto-task-link" placeholder="Ссылка" required>
                    <input type="number" id="auto-task-qty" placeholder="Количество" min="1" required>
                    <input type="number" id="auto-task-deviation" placeholder="Отклонение" min="0" value="0">
                    <input type="number" id="auto-task-deadline" placeholder="Время (мин)" min="1" required>
                    <button type="submit" class="btn-primary">Создать автозадачу</button>
                </form>
                <div id="auto-tasks-list"></div>
            </div>
            <div id="tab-profile" class="tab-content">
                <div class="profile-info">
                    <p>💰 Баланс: <span id="profile-balance">0</span></p>
                    <p>📦 Подписка: <span id="profile-sub">Нет</span></p>
                    <p>📅 Истекает: <span id="profile-expires">Нет</span></p>
                </div>
                <div id="subs-list"></div>
            </div>
        </div>
    </div>
    <script src="/miniapp/app.js"></script>
</body>
</html>
